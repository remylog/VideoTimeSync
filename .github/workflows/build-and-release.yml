name: Build and Release Mac App

on:
  push:
    tags:
      - 'v*' # v1.0, v2.1.0 などのタグが付いた時だけ実行

jobs:
  build:
    runs-on: macos-latest # macOS環境で実行

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --windowed --name "VideoTimeSync" main.py

      - name: Archive app
        run: |
          cd dist
          zip -r VideoTimeSync.zip VideoTimeSync.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VideoTimeSync.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}