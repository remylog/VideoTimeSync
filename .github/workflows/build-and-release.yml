name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*' # v1.0.0 などのタグがプッシュされた時に起動

jobs:
  build-and-release:
    runs-on: macos-14 # Appleシリコン環境でビルド
    permissions:
      contents: write # リリースを作成するために書き込み権限が必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install tkinterdnd2 pillow typing_extensions

      - name: Verify runner architecture
        run: |
          uname -m

      - name: Build macOS App with PyInstaller
        run: |
          # アプリをビルド。名前は VideoTimeSync とします
          pyinstaller --noconfirm --windowed --onedir --name "VideoTimeSync" \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            --hidden-import PIL \
            --hidden-import typing_extensions \
            main.py
                
      - name: Compress App to ZIP
        run: |
          # macOSの実行権限を保持したままZIP化
          ditto -c -k --sequesterRsrc --keepParent dist/VideoTimeSync.app VideoTimeSync-macOS.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: VideoTimeSync-macOS.zip
          name: Release ${{ github.ref_name }}
          body: |
            VideoTimeSync の最新バージョンです。
            
            ### インストール方法
            1. `VideoTimeSync-macOS.zip` をダウンロードして解凍します。
            2. `VideoTimeSync.app` を「アプリケーション」フォルダに移動します。
            3. 初回起動時は右クリックから「開く」を選択してください。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}